<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TERRA-SCAN X1 | Tactical Soil Analysis</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');

        :root {
            --neon-green: #39ff14;
            --dark-steel: #0a0a0c;
            --panel-bg: #141417;
            --border-glow: rgba(57, 255, 20, 0.3);
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--dark-steel);
            background-image: 
                linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(57, 255, 20, 0.03) 3px);
            color: #e0e0e0;
            margin: 0;
            overflow-x: hidden;
        }

        header {
            padding: 60px 20px;
            text-align: center;
            border-bottom: 2px solid var(--neon-green);
            background: linear-gradient(180deg, #1a1a1e 0%, var(--dark-steel) 100%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            margin: 0;
            letter-spacing: 5px;
            color: var(--neon-green);
            text-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
            text-transform: uppercase;
        }

        .status-bar {
            background: var(--neon-green);
            color: black;
            font-weight: bold;
            padding: 5px 20px;
            display: inline-block;
            transform: skewX(-20deg);
            margin-top: 10px;
            font-size: 0.8rem;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 40px;
            background: var(--panel-bg);
            border-left: 4px solid var(--neon-green);
            position: relative;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.7);
        }

        /* Tactical Corner Cuts */
        .container::before {
            content: "";
            position: absolute;
            top: 0; right: 0;
            border-style: solid;
            border-width: 0 40px 40px 0;
            border-color: transparent var(--dark-steel) transparent transparent;
        }

        .upload-zone {
            border: 1px solid #333;
            background: rgba(255,255,255,0.02);
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .upload-zone:hover {
            background: rgba(57, 255, 20, 0.05);
            border-color: var(--neon-green);
        }

        .upload-zone h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .file-input {
            opacity: 0;
            position: absolute;
            z-index: -1;
        }

        .btn-action {
            width: 100%;
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.3s;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
        }

        .btn-action:hover {
            background: var(--neon-green);
            color: black;
            box-shadow: 0 0 30px var(--neon-green);
        }

        .data-readout {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #666;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #222;
            padding-top: 15px;
        }

        .glitch-text {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 40px;
            letter-spacing: 2px;
            color: #444;
        }
    </style>
</head>
<body>

    <header>
        <h1>TERRA-SCAN X1</h1>
        <div class="status-bar">SYSTEM STATUS: READY</div>
    </header>

    <div class="container">
        <div class="description" style="margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 10px;">
            <span style="color: var(--neon-green)">></span> INITIALIZING FIELD SPECTROMETER...<br>
            <span style="color: var(--neon-green)">></span> UPLOAD VISUAL SAMPLES FOR CLASSIFICATION.
        </div>

        <form method="POST" enctype="multipart/form-data">
            <div class="upload-zone" onclick="document.getElementById('soil_images').click()">
                <div class="glitch-text" style="font-size: 2rem; color: var(--neon-green)">[ + ]</div>
                <h3>ACQUIRE IMAGERY</h3>
                <p style="font-size: 0.8rem; color: #777;">SUPPORTED: RAW, JPG, PNG, TIFF</p>
                
                <input
                    type="file"
                    name="images"
                    id="soil_images"
                    class="file-input"
                    accept="image/*"
                    capture="environment"
                    multiple
                    required
                />
            </div>

            <input type="hidden" id="latitude" name="latitude" />
            <input type="hidden" id="longitude" name="longitude" />

            <button type="submit" class="btn-action">START EXTRACTION</button>
            
            <div class="data-readout">
                <span>LAT: <span id="lat-val" style="color:#aaa">SEARCHING...</span></span>
                <span>LNG: <span id="lng-val" style="color:#aaa">SEARCHING...</span></span>
                <span style="color: var(--neon-green)">V.2.0.4-PRO</span>
            </div>
        </form>
    </div>

    <footer>
        SECURE CONNECTION // ENCRYPTED ANALYSIS // PROPERTY OF TERRA-CORE CORP
    </footer>

<script>
    navigator.geolocation.getCurrentPosition(function(position) {
        const lat = position.coords.latitude.toFixed(4);
        const lng = position.coords.longitude.toFixed(4);
        document.getElementById("latitude").value = lat;
        document.getElementById("longitude").value = lng;
        document.getElementById("lat-val").innerText = lat;
        document.getElementById("lng-val").innerText = lng;
        document.querySelector(".status-bar").innerText = "SYSTEM STATUS: GEOLINK ACTIVE";
    }, function(error) {
        document.getElementById("lat-val").innerText = "OFFLINE";
        document.getElementById("lng-val").innerText = "OFFLINE";
    });
</script>

</body>
</html>
